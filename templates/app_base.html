{% extends "base.html" %}
{% block body %}
<div class="app-shell">
  <!-- Top nav -->
  <div class="top-nav">
    <div class="top-nav-logo">Vibe<span>Match</span></div>
    <div style="display:flex;gap:8px;align-items:center;">
      {% block top_nav_actions %}{% endblock %}
    </div>
  </div>

  <!-- Flash messages -->
  {% if messages %}
  <div style="position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:300;width:90%;max-width:400px;">
    {% for message in messages %}
    <div class="toast toast-{{ message.tags }}" onclick="this.remove()">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Page content -->
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="{% url 'discover' %}" class="nav-item {% if request.resolver_match.url_name == 'discover' %}active{% endif %}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="{% if request.resolver_match.url_name == 'discover' %}var(--pink){% else %}none{% endif %}" stroke="{% if request.resolver_match.url_name == 'discover' %}var(--pink){% else %}var(--gray-300){% endif %}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Discover</span>
    </a>
    <a href="{% url 'chat_list' %}" class="nav-item {% if 'chat' in request.resolver_match.url_name %}active{% endif %}" style="position:relative;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="{% if 'chat' in request.resolver_match.url_name %}var(--pink){% else %}var(--gray-300){% endif %}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span id="chat-badge-wrap" style="position:absolute;top:4px;right:8px;display:none;">
        <span id="chat-badge" class="nav-badge"></span>
      </span>
      <span>Chats</span>
    </a>
    <a href="{% url 'notifications' %}" class="nav-item {% if request.resolver_match.url_name == 'notifications' %}active{% endif %}" style="position:relative;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="{% if request.resolver_match.url_name == 'notifications' %}var(--pink){% else %}var(--gray-300){% endif %}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span id="notif-badge-wrap" style="position:absolute;top:4px;right:8px;display:none;">
        <span id="notif-badge" class="nav-badge"></span>
      </span>
      <span>Alerts</span>
    </a>
    <a href="{% url 'profile' %}" class="nav-item {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="{% if request.resolver_match.url_name == 'profile' %}var(--pink){% else %}var(--gray-300){% endif %}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>
</div>
<script>
// Poll for unread counts every 30s
function updateBadges(){
  fetch('{% url "unread_count" %}').then(r=>r.json()).then(d=>{
    const nb = document.getElementById('notif-badge');
    const nw = document.getElementById('notif-badge-wrap');
    const cb = document.getElementById('chat-badge');
    const cw = document.getElementById('chat-badge-wrap');
    if(nb && d.notifications > 0){ nb.textContent = d.notifications > 9 ? '9+' : d.notifications; nw.style.display='block'; }
    else if(nw){ nw.style.display='none'; }
    if(cb && d.messages > 0){ cb.textContent = d.messages > 9 ? '9+' : d.messages; cw.style.display='block'; }
    else if(cw){ cw.style.display='none'; }
  }).catch(()=>{});
}
updateBadges();
setInterval(updateBadges, 30000);
</script> {# closes app-shell #}
{% endblock body %}
